spring.application.name=projeto
server.port=8082

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Mantenha o padrão, mas deixe o Docker decidir o valor real
spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações de conexão (Injetadas pelo Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

integracoes.apontamento-horas.url=${APONTAMENTO_HORAS_URL:http://localhost:8084}
integracoes.usuario.url=${USUARIO_SERVICE_URL:http://localhost:8083}
internal.api-key=${INTERNAL_API_KEY:}
