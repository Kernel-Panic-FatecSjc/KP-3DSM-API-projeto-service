spring.application.name=projeto
server.port=8082

# Dialeto e DDL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inicialização do SQL (data.sql roda APÓS o Hibernate criar as tabelas)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jpa.defer-datasource-initialization=true

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari — força SET FOREIGN_KEY_CHECKS=0 na conexão antes de qualquer insert
spring.datasource.hikari.connection-init-sql=SET FOREIGN_KEY_CHECKS=0